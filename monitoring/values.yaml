# Helm values for kube-prometheus-stack chart on OrbitStack
# Usage:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack --namespace monitoring --create-namespace -f monitoring/values.yaml

grafana:
  enabled: true
  adminPassword: "admin"
  service:
    type: ClusterIP
    port: 80
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'orbitstack'
          orgId: 1
          folder: 'OrbitStack'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/orbitstack

prometheus:
  enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1

additionalPrometheusRulesMap:
  orbitstack-alerts:
    groups:
      - name: orbitstack.rules
        rules:
          - alert: HighServiceErrorRate
            expr: (sum(rate(http_requests_total{status=~"5.."}[5m])) by (app) / sum(rate(http_requests_total[5m])) by (app)) * 100 > 5
            for: 5m
            labels:
              severity: critical
              namespace: orbitstack
            annotations:
              summary: "High HTTP error rate on {{ $labels.app }}"
              description: "Service {{ $labels.app }} error rate is {{ $value | printf \"%.2f\" }}% over the last 5 minutes (exceeds threshold of 5%)."
