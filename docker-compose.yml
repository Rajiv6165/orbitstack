version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orbitstack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - orbitstack

  redis:
    image: redis:7-alpine
    container_name: orbitstack-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - orbitstack

  # ─────────────────────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: orbitstack-auth
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      SECRET_KEY: super-secret-jwt-key-CHANGE-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orbitstack
    restart: unless-stopped

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: orbitstack-catalog
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orbitstack
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: orbitstack-order
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      AUTH_SERVICE_URL: http://auth-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
    networks:
      - orbitstack
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: orbitstack-notification
    ports:
      - "8004:8000"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - orbitstack
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:

networks:
  orbitstack:
    driver: bridge
