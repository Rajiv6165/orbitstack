apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: orbitstack
  labels:
    app: catalog-service
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: orbitstack-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: orbitstack/catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orbitstack-secrets
                  key: DATABASE_URL_CATALOG
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: orbitstack
  labels:
    app: catalog-service
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: orbitstack-platform
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: catalog-service
