apiVersion: v1
kind: Secret
metadata:
  name: orbitstack-secrets
  namespace: orbitstack
  labels:
    app.kubernetes.io/name: orbitstack-secrets
    app.kubernetes.io/part-of: orbitstack-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  SECRET_KEY: "super-secret-jwt-key-CHANGE-in-production"
  DATABASE_URL_AUTH: "postgresql://postgres:postgres@postgres.orbitstack.svc.cluster.local:5432/auth_db"
  DATABASE_URL_CATALOG: "postgresql://postgres:postgres@postgres.orbitstack.svc.cluster.local:5432/catalog_db"
  DATABASE_URL_ORDER: "postgresql://postgres:postgres@postgres.orbitstack.svc.cluster.local:5432/order_db"
