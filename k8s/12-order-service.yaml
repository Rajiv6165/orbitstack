apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: orbitstack
  labels:
    app: order-service
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: orbitstack-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: orbitstack/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orbitstack-secrets
                  key: DATABASE_URL_ORDER
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: orbitstack-config
                  key: AUTH_SERVICE_URL
            - name: CATALOG_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: orbitstack-config
                  key: CATALOG_SERVICE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: orbitstack-config
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: orbitstack
  labels:
    app: order-service
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: orbitstack-platform
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: order-service
