name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
            image_name: orbitstack-auth-service
          - name: catalog-service
            context: ./services/catalog-service
            dockerfile: ./services/catalog-service/Dockerfile
            image_name: orbitstack-catalog-service
          - name: order-service
            context: ./services/order-service
            dockerfile: ./services/order-service/Dockerfile
            image_name: orbitstack-order-service
          - name: notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
            image_name: orbitstack-notification-service
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: orbitstack-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Owner Name
        id: prep
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${REPO_OWNER}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.service.image_name }}:${{ github.sha }}
            ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.service.image_name }}:latest

  deploy-k3s:
    name: Deploy to k3s Cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH to k3s
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ secrets.K3S_HOST != '' && secrets.K3S_SSH_KEY != '' }}
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER || 'ubuntu' }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            TAG="${{ github.sha }}"

            kubectl set image deployment/auth-service auth-service=ghcr.io/${REPO_OWNER}/orbitstack-auth-service:${TAG} -n orbitstack
            kubectl set image deployment/catalog-service catalog-service=ghcr.io/${REPO_OWNER}/orbitstack-catalog-service:${TAG} -n orbitstack
            kubectl set image deployment/order-service order-service=ghcr.io/${REPO_OWNER}/orbitstack-order-service:${TAG} -n orbitstack
            kubectl set image deployment/notification-service notification-service=ghcr.io/${REPO_OWNER}/orbitstack-notification-service:${TAG} -n orbitstack
            kubectl set image deployment/frontend frontend=ghcr.io/${REPO_OWNER}/orbitstack-frontend:${TAG} -n orbitstack

            kubectl rollout status deployment/auth-service -n orbitstack --timeout=120s
            kubectl rollout status deployment/catalog-service -n orbitstack --timeout=120s
            kubectl rollout status deployment/order-service -n orbitstack --timeout=120s
            kubectl rollout status deployment/notification-service -n orbitstack --timeout=120s
            kubectl rollout status deployment/frontend -n orbitstack --timeout=120s
